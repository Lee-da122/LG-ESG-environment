<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>순환경제 — Re:born</title>
  <style>
    :root { --brand: #D20565; --brand-dark: #B0044F; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #app {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      min-height: 100vh;
    }

    .screen {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 24px 24px 36px;
    }

    /* ── 뒤로 버튼 ── */

    .btn-back {
      display: inline-flex;
      align-items: center;
      background: transparent;
      border: none;
      color: #6b7280;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
      margin-bottom: 16px;
      align-self: flex-start;
    }

    .btn-back:hover  { color: #374151; }
    .btn-back:active { color: #111827; }

    .screen-title {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 20px;
    }

    /* ── 탭 ── */

    .ce-tabs {
      display: flex;
      border-bottom: 2px solid #e5e7eb;
      margin-bottom: 24px;
    }

    .ce-tab {
      flex: 1;
      padding: 10px 4px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-size: 13px;
      font-weight: 600;
      color: #9ca3af;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .ce-tab:hover  { color: #374151; }

    .ce-tab.active {
      color: var(--brand);
      border-bottom-color: var(--brand);
    }

    /* ── 탭 패널 ── */

    .ce-panel {
      flex: 1;
      font-size: 14px;
      color: #9ca3af;
      text-align: center;
      padding-top: 48px;
    }

    .ce-panel.hidden { display: none; }

    /* ── 로고 ── */

    .logo-lockup {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-lockup img:first-of-type {
      height: 22px;
      width: auto;
      max-width: 120px;
      object-fit: contain;
      display: block;
      flex-shrink: 0;
    }

    .logo-lockup img:last-of-type {
      height: 16px;
      width: auto;
      max-width: 80px;
      object-fit: contain;
      display: block;
      flex-shrink: 0;
    }

    .logo-sep {
      width: 1px;
      height: 13px;
      background: #d1d5db;
      flex-shrink: 0;
    }

    /* ── 전역 레이아웃 ── */

    .g-header {
      width: 100%;
      background: #fff;
      border-bottom: 1px solid #f0e8ed;
      flex-shrink: 0;
    }

    .g-header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .g-wordmark {
      font-size: 22px;
      font-weight: 800;
      color: var(--brand);
      letter-spacing: -0.03em;
      flex-shrink: 0;
      user-select: none;
    }

    .g-main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .g-footer {
      width: 100%;
      background: #fff;
      border-top: 1px solid #f5f0f3;
      padding: 14px 24px;
      display: flex;
      justify-content: center;
      flex-shrink: 0;
    }

    .g-footer .logo-lockup          { opacity: 0.25; }
    .g-footer .logo-lockup img:first-of-type { height: 20px; }
    .g-footer .logo-lockup img:last-of-type  { height: 14px; }
    .g-footer .logo-sep                       { height: 12px; }

    /* ── 반응형 ── */

    @media (max-width: 599px) {
      .g-header, .g-footer { display: none; }
      .g-main              { display: block; }
      #app {
        max-width: 100%;
        min-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
    }

    @media (min-width: 600px) {
      .g-main {
        background: linear-gradient(150deg, #fdf4f8 0%, #f9fafb 55%, #fceef6 100%);
        padding: 40px 24px 56px;
        align-items: flex-start;
      }

      #app {
        min-height: 0;
        border-radius: 20px;
        box-shadow: 0 8px 40px rgba(210, 5, 101, 0.10),
                    0 2px 8px rgba(0, 0, 0, 0.05);
        overflow: hidden;
      }

      .screen { min-height: 540px; }
    }
  </style>
</head>
<body>
  <header class="g-header">
    <div class="g-header-inner">
      <span class="g-wordmark">Re:born</span>
      <div class="logo-lockup" style="opacity:0.6;">
        <img src="assets/logo-esg.png" alt="ESG 아카데미" onerror="this.style.display='none'" />
        <span class="logo-sep"></span>
        <img src="assets/logo-lg.png" alt="LG전자" onerror="this.style.display='none'" />
      </div>
    </div>
  </header>

  <main class="g-main">
    <div id="app">
      <div class="screen">
        <button class="btn-back" onclick="history.back()">‹ 뒤로</button>
        <h1 class="screen-title">순환경제</h1>

        <div class="ce-tabs" role="tablist">
          <button class="ce-tab active" role="tab" onclick="switchTab('what')">순환경제란?</button>
          <button class="ce-tab"        role="tab" onclick="switchTab('lg')">LG전자는?</button>
          <button class="ce-tab"        role="tab" onclick="switchTab('cases')">다른 기업 사례</button>
        </div>

        <div id="tab-what"  class="ce-panel">준비 중</div>
        <div id="tab-lg"    class="ce-panel hidden">준비 중</div>
        <div id="tab-cases" class="ce-panel hidden">준비 중</div>
      </div>
    </div>
  </main>

  <footer class="g-footer">
    <div class="logo-lockup">
      <img src="assets/logo-esg.png" alt="ESG 아카데미" onerror="this.style.display='none'" />
      <span class="logo-sep"></span>
      <img src="assets/logo-lg.png" alt="LG전자" onerror="this.style.display='none'" />
    </div>
  </footer>

  <script>
    const TABS = ['what', 'lg', 'cases'];

    function switchTab(name) {
      TABS.forEach(function(id) {
        var panel = document.getElementById('tab-' + id);
        if (panel) panel.classList.toggle('hidden', id !== name);
      });
      document.querySelectorAll('.ce-tab').forEach(function(btn, i) {
        btn.classList.toggle('active', TABS[i] === name);
      });
    }
  </script>
</body>
</html>
